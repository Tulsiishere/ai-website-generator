<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Website Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 40px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .badge {
      background: #7c3aed;
      color: #ede9fe;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .main {
      display: flex;
      flex: 1;
      height: calc(100vh - 73px);
    }

    /* LEFT PANEL */
    .sidebar {
      width: 380px;
      min-width: 320px;
      background: #111827;
      border-right: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      padding: 32px 28px;
      gap: 24px;
    }

    .sidebar h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-chip {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .example-chip:hover {
      background: #7c3aed22;
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 130px;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: #7c3aed; }
    textarea::placeholder { color: #475569; }

    button#generateBtn {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button#generateBtn:hover:not(:disabled) { background: #6d28d9; }
    button#generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      font-size: 0.85rem;
      color: #64748b;
      text-align: center;
      min-height: 20px;
    }

    .status-msg.error { color: #f87171; }
    .status-msg.success { color: #34d399; }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.15s;
    }

    #previewBtn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
    }

    #previewBtn:hover { border-color: #7c3aed; color: #c4b5fd; }

    #downloadBtn {
      background: #065f46;
      color: #d1fae5;
    }

    #downloadBtn:hover { background: #047857; }

    .result-actions { display: none; }

    /* RIGHT PANEL */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }

    .preview-toolbar {
      padding: 12px 20px;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red   { background: #ef4444; }
    .dot.amber { background: #f59e0b; }
    .dot.green { background: #22c55e; }

    .url-bar {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #64748b;
      margin: 0 12px;
    }

    .preview-frame-wrap {
      flex: 1;
      position: relative;
    }

    iframe#previewFrame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #334155;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.95rem;
      color: #475569;
    }

    /* Loading overlay on preview */
    .preview-loading {
      position: absolute;
      inset: 0;
      background: #0f172a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #64748b;
    }

    .preview-loading.active { display: flex; }

    .big-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1e293b;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .preview-loading p { font-size: 0.95rem; }

    @media (max-width: 768px) {
      .main { flex-direction: column; height: auto; }
      .sidebar { width: 100%; min-width: unset; height: auto; }
      .preview-panel { min-height: 500px; }
    }
  </style>
</head>
<body>

<header>
  <h1>AI Website Generator</h1>
  <span class="badge">Powered by Gemini</span>
</header>

<div class="main">

  <!-- LEFT: Input Panel -->
  <div class="sidebar">
    <div>
      <h2>Describe your website</h2>
    </div>

    <div class="examples">
      <p style="font-size:0.8rem;color:#475569;margin-bottom:4px;">Try an example:</p>
      <button class="example-chip" onclick="setPrompt(this)">Portfolio website for a Mumbai photographer</button>
      <button class="example-chip" onclick="setPrompt(this)">Bakery in Bandra selling artisan breads</button>
      <button class="example-chip" onclick="setPrompt(this)">Yoga studio in Pune for working professionals</button>
      <button class="example-chip" onclick="setPrompt(this)">Home tutor offering Maths and Science classes</button>
    </div>

    <textarea id="promptInput" placeholder="e.g. A modern dental clinic in Andheri, Mumbai..."></textarea>

    <button id="generateBtn" onclick="generateSite()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Generate Website</span>
    </button>

    <div class="status-msg" id="statusMsg"></div>

    <div class="result-actions" id="resultActions">
      <a class="action-btn" id="previewBtn" href="#" target="_blank">
        Open in new tab
      </a>
      <a class="action-btn" id="downloadBtn" href="#" download>
        Download HTML
      </a>
    </div>
  </div>

  <!-- RIGHT: Preview Panel -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <div class="dot red"></div>
      <div class="dot amber"></div>
      <div class="dot green"></div>
      <div class="url-bar" id="urlBar">No site generated yet</div>
    </div>

    <div class="preview-frame-wrap">

      <div class="empty-state" id="emptyState">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <p>Your generated website will appear here</p>
      </div>

      <div class="preview-loading" id="previewLoading">
        <div class="big-spinner"></div>
        <p id="loadingText">Generating your website...</p>
      </div>

      <iframe id="previewFrame" src="about:blank"></iframe>

    </div>
  </div>

</div>

<script>
  const messages = [
    "Analysing your prompt...",
    "Generating layout blueprint...",
    "Writing content with AI...",
    "Building components...",
    "Applying styles...",
    "Almost ready..."
  ];

  function setPrompt(el) {
    document.getElementById('promptInput').value = el.textContent.trim();
    document.getElementById('promptInput').focus();
  }

  async function generateSite() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) {
      showStatus('Please enter a description first.', 'error');
      return;
    }

    setLoading(true);
    document.getElementById('resultActions').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('previewLoading').classList.add('active');

    // Cycle loading messages
    let msgIndex = 0;
    const msgInterval = setInterval(() => {
      msgIndex = (msgIndex + 1) % messages.length;
      document.getElementById('loadingText').textContent = messages[msgIndex];
    }, 1800);

    try {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      clearInterval(msgInterval);

      if (!res.ok) {
        throw new Error(data.detail || 'Generation failed');
      }

      const previewUrl = data.preview_url;
      const downloadUrl = data.download_url;

      // Update iframe
      document.getElementById('previewFrame').src = previewUrl;
      document.getElementById('urlBar').textContent = `http://127.0.0.1:8000${previewUrl}`;

      // Update action buttons
      document.getElementById('previewBtn').href = previewUrl;
      document.getElementById('downloadBtn').href = downloadUrl;
      document.getElementById('resultActions').style.display = 'flex';

      showStatus('Website generated successfully!', 'success');

    } catch (err) {
      clearInterval(msgInterval);
      showStatus(err.message, 'error');
      document.getElementById('emptyState').style.display = 'flex';
    } finally {
      setLoading(false);
      document.getElementById('previewLoading').classList.remove('active');
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('generateBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent = on ? 'Generating...' : 'Generate Website';
  }

  function showStatus(msg, type = '') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
  }
</script>

</body>
</html>
